<!DOCTYPE html>
<html lang="en">
<head>
    <title>Advanced Function Operations</title>
</head>
<body>
    <h1>Advanced Function Operations</h1>
    <script>
        function calculateSum( num1, num2){
            return num1+num2;
        }
        let sum = calculateSum(3,7);

        function calculateProduct(num1, num2){
            return num1*num2;
        }
        let product = calculateProduct(12,6);

        console.log('Sum: '+sum);
        console.log('Product: '+product);
    </script>
    
</body>
</html>
