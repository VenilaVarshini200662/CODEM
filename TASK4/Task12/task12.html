<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quiz Engine</title>
    <style>
        body{
            background-color:rgb(16, 46, 15);
            font-size:25px;
            color: white;
        }
        h1{
            font-size: 35px;
        }
        button{
            padding:8px;
            font-size:18px;
            margin:8px;
            width:500px;
            border-radius: 10px;
        }
        button:hover{
            background-color: rgb(162, 226, 162);
            cursor:pointer;
        }
       .quizContainer{
            background-color: rgb(63, 138, 63);
            width:700px;
            height:400px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            border-radius: 20px;
            color: black;
            font-size: 30px;
        }
    </style>
</head>
<body><br>
<center>
    <h1>Quiz Engine</h1><br>
    <div class="quizContainer">
    </div>
</center>
<script>
    const quiz = [
    {
    question: "What is JavaScript?",
    options: ["Language", "Framework", "Database"],
    answer: "Language"
    },
    {
    question: "Which keyword declares a variable?",
    options: ["var", "loop", "print"],
    answer: "var"
    },
    {
    question: "Which company developed JavaScript?",
    options: ["Microsoft", "Netscape", "Google"],
    answer: "Netscape"
    },
    {
    question: "Which symbol is used for comments in JavaScript?",
    options: ["//", "**", "##"],
    answer: "//"
    },
    {
    question: "Which method prints output in the browser console?",
    options: ["console.log()", "print()", "display()"],
    answer: "console.log()"
    }
    ];

    let currentQuestion= 0;
    let score= 0;
    const quizContainer = document.querySelector(".quizContainer");
    function showQuestion(){
        quizContainer.innerHTML= "";
        if(currentQuestion >= quiz.length){
            const result = document.createElement("h2");
            result.textContent = "Final Score: " + score + " / " + quiz.length;
            quizContainer.appendChild(result);
            return;
        }
        
        const questionElement =document.createElement("p");
        questionElement.textContent= quiz[currentQuestion].question;
        quizContainer.appendChild(questionElement);
        for(let i=0; i<quiz[currentQuestion].options.length; i++){
            const optionButton =document.createElement("button");
            optionButton.textContent = quiz[currentQuestion].options[i];
            optionButton.onclick = function(){
                checkAnswer(quiz[currentQuestion].options[i]);
            };
            quizContainer.appendChild(optionButton);
        }
    }
    showQuestion();

    function checkAnswer(selectedOption){
        if(selectedOption === quiz[currentQuestion].answer){
            score++;
        }
        currentQuestion++;
        showQuestion();
    }
</script>
</body>
</html>
