<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dynamic Scoreboard</title>
    <style>
        body{
            background-color: bisque;
        }
        h1{
            margin-top:60px;
            font-size: 45px;
        }
        .scoreBoard{
            font-size: 25px;
        }
    </style>
</head>
<body>
    <center>
        <h1>Dynamic Scoreboard</h1><br><br>
        <div class="scoreBoard"></div>
    </center>

    <script>
        const scores = [10,15,8];
        const scoreBoardElement = document.querySelector(".scoreBoard");
        let scoreBoardContent='';

        function displayScore(){
            for( let i=0; i < scores.length ; i++){
                scoreBoardContent = scoreBoardContent +
                `<p>Player ${i+1}: ${scores[i]}  <button onclick="addScore(${i},${scores[i]})">+</button> <button onclick = "subScore(${i},${scores[i]})">-</button></p>`;
            }
            let highestScore = Math.max(...scores);
            let lowestScore = Math.min(...scores);
            scoreBoardContent = scoreBoardContent + `<p>Highest Score: ${highestScore} (Player ${scores.indexOf(highestScore)+1})<br><br>
                LowestScore : ${lowestScore} (Player ${scores.indexOf(lowestScore) + 1})<p>`;
            scoreBoardElement.innerHTML =scoreBoardContent;
         }
        displayScore();

        function addScore(i,score){
            scores[i]=score + 1;
            scoreBoardContent = '';
            displayScore();
        }

        function subScore(i,score){
            scores[i]=score - 1;
            scoreBoardContent = '';
            displayScore();
        }
    </script>    
</body>
</html>
